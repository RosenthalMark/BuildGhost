<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHOSTops Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="hud-shell" class="hud-shell">
      <aside id="module-dock" class="module-dock panel-frame">
        <header class="module-dock-header" id="logo-container">
          <img id="static-logo" src="./assets/core/GHOSTops-terminal-logo-2.png" alt="GHOSTops Logo" style="display: block;" />
        </header>

        <nav class="tool-nav" aria-label="Tool Navigation">
          <div class="module-dock-label" style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px; border-bottom: 1px solid rgb(184 255 90 / 0.15); padding-bottom: 6px;">Operational Modules</div>
          <button class="nav-item module-slot active" data-route="tool" data-tool="scrapetag">
            <span class="nav-logo-wrap">
              <img class="nav-tool-logo" src="../Toolbelt/scrapetag/assets/scrapetag-logo.png" alt="Scrapetag" />
              <span class="tool-live-dot" aria-hidden="true"></span>
            </span>
            <span class="nav-meta">Recon Harvesting</span>
          </button>
          <button class="nav-item module-slot" data-route="tool" data-tool="GHOSTstub">
            <span class="nav-logo-wrap">
              <img class="nav-tool-logo" src="../Toolbelt/GHOSTstub/assets/ghostStub-logo.png" alt="GHOSTstub" />
              <span class="tool-live-dot" aria-hidden="true"></span>
            </span>
            <span class="nav-meta">Payload Shaping</span>
          </button>
          <button class="nav-item module-slot" data-route="tool" data-tool="BlackBox">
            <span class="nav-logo-wrap">
              <img class="nav-tool-logo" src="../Toolbelt/BlackBox/assets/Blackbox-logo.png" alt="BLACKbox" />
              <span class="tool-live-dot" aria-hidden="true"></span>
            </span>
            <span class="nav-meta">Migration Core</span>
          </button>
          <button class="nav-item module-slot" data-route="tool" data-tool="Cypress">
            <span class="nav-logo-wrap">
              <img class="nav-tool-logo" src="../Toolbelt/Cypress/assets/Cypress.png" alt="Cypress" />
              <span class="tool-live-dot" aria-hidden="true"></span>
            </span>
            <span class="nav-meta">E2E Automation</span>
          </button>
          <button class="nav-item module-slot" data-route="tool" data-tool="Playwright">
            <span class="nav-logo-wrap">
              <img class="nav-tool-logo" src="../Toolbelt/Playwright/assets/Playwright.png" alt="Playwright" />
              <span class="tool-live-dot" aria-hidden="true"></span>
            </span>
            <span class="nav-meta">Browser Automation</span>
          </button>
          <button class="nav-item module-slot" data-route="tool" data-tool="Spooler">
            <span class="nav-logo-wrap">
              <span class="nav-text-logo">SPOOLER</span>
              <span class="nav-text-sub">ENV HARNESS</span>
              <span class="tool-live-dot" aria-hidden="true"></span>
            </span>
            <span class="nav-meta">Reproducible Environment Harness</span>
          </button>
          <button class="nav-item module-slot" data-route="tool" data-tool="Trace">
            <span class="nav-logo-wrap">
              <img class="nav-tool-logo" src="../Toolbelt/Trace/assets/trace_logo.png" alt="Trace" />
              <span class="tool-live-dot" aria-hidden="true"></span>
            </span>
            <span class="nav-meta">Deterministic State Engine</span>
          </button>
          <div class="module-dock-fillers" style="opacity: 0.4; margin-top: 10px;">
            <div class="nav-item module-slot future-placeholder" style="cursor: default; border-style: dashed;"><span class="nav-name">FUTURE BUILDGHOST</span></div>
          </div>
        </nav>

        <div class="module-dock-anchors panel-inner">
          <button class="nav-item nav-anchor-btn" id="nav-settings" data-route="config">
            <span class="nav-logo-wrap">
              <span class="nav-name nav-anchor-label">[ SETTINGS ]</span>
            </span>
          </button>
          <button class="nav-item nav-anchor-btn" id="nav-signin" data-route="auth">
            <span class="nav-logo-wrap">
              <span class="nav-name nav-anchor-label">[ SIGN IN ]</span>
            </span>
          </button>
          <button class="nav-item nav-anchor-btn nav-docs" data-route="docs" data-tool="SYSTEM">
            <span class="nav-logo-wrap">
              <span class="nav-name nav-anchor-label">SYSTEM DOCS</span>
            </span>
          </button>
        </div>

        <footer class="module-dock-footer panel-inner">
          <div>
            <p class="stat-label">Polling</p>
            <p id="polling-status" class="stat-value">standby</p>
          </div>
          <div>
            <p class="stat-label">Selected</p>
            <p id="selected-status" class="stat-value">Scrapetag</p>
          </div>
        </footer>
      </aside>
      <button
        id="module-dock-toggle"
        class="module-dock-toggle"
        type="button"
        aria-label="Collapse Module Dock"
        aria-controls="module-dock"
        aria-expanded="true"
      >
        <span class="module-dock-toggle-hitbox" aria-hidden="true"></span>
        <span id="module-dock-toggle-icon" class="module-dock-toggle-icon" aria-hidden="true"></span>
      </button>

      <main class="stage-wrap panel-frame">
        <header id="tactical-stage-header" class="stage-header panel-inner">
          <div class="stage-header-main">
            <p class="kicker">Tactical Stage</p>
            <h2 id="stage-title">Scrapetag</h2>
          </div>
          <div id="nixie-scroller" class="nixie-scroller nixie-scroller--header" aria-live="polite">
            <div class="nixie-lane">
              <span id="nixie-spinner" class="nixie-spinner" aria-hidden="true"></span>
              <span class="nixie-text">&gt; READY FOR MODULE TELEMETRY_</span>
            </div>
          </div>
          <div class="signal-group-wrap">
            <div class="signal-group">
              <span class="signal-dot"></span>
              <span id="tool-health">verifying</span>
            </div>
            <span id="stage-chip" class="stage-chip" style="display:block; text-align:center; margin-top:2px; font-size:0.65rem;">pending</span>
          </div>
        </header>

        <section class="stage-main panel-inner">
          <div class="window-stack">
            <section class="window-frame shell-window">
              <header class="window-topbar">
                <span></span>
              </header>
              <article id="stage-content" class="window-content fade-swap" aria-live="polite"></article>
            </section>
          </div>
        </section>
      </main>
    </div>

    <template id="module-missing-template">
      <section class="state-grid">
        <div class="module-card">
          <h3>Module Missing</h3>
          <p id="missing-description"></p>
          <dl class="meta-grid">
            <div>
              <dt>Expected Path</dt>
              <dd id="missing-path"></dd>
            </div>
            <div>
              <dt>Watcher</dt>
              <dd>window.ghostOps.checkTool polling</dd>
            </div>
          </dl>
          <button id="initialize-module" class="primary-action">INITIALIZE MODULE</button>
        </div>
        <div class="module-card preview-card">
          <h3>Preview Feed</h3>
          <img id="preview-gif" alt="Module preview GIF" loading="lazy" />
        </div>
      </section>
    </template>

    <template id="tactical-runner-template">
      <section class="state-grid single-column">
        <div class="module-card runner-grid">
          <header class="runner-command-row">
            <h3>Tactical Runner</h3>
            <div class="runner-launch-wrap">
              <div class="runner-key-stack">
                <p class="runner-key-caption">CLICK TO LOAD TARGET PAGE</p>
                <button
                  id="launch-scrape-btn"
                  type="button"
                  class="launch-spacebar-key"
                  aria-label="Launch in-app scrape session"
                >
                  <span class="launch-key-bezel">
                    <span class="launch-key-label-root" aria-hidden="true"></span>
                  </span>
                </button>
              </div>
              <div class="runner-key-stack" data-scrapetag-only>
                <p class="runner-key-caption">CLICK TO START SELECTOR HARVEST</p>
                <button
                  id="start-harvest-btn"
                  class="launch-spacebar-key harvest-spacebar-key"
                  type="button"
                  aria-label="Start Harvest"
                >
                  <span class="launch-key-bezel">
                    <span class="launch-key-label-root" aria-hidden="true"></span>
                  </span>
                </button>
              </div>
            </div>
            <div class="runner-strict-wrap" data-scrapetag-only>
              <label class="strict-harvest-toggle" for="strict-harvest-toggle">
                <input id="strict-harvest-toggle" type="checkbox" />
                <span class="strict-harvest-pill" aria-hidden="true"></span>
                <span class="strict-harvest-label">STRICT MODE</span>
              </label>
            </div>
          </header>

          <div class="scrape-url-bar" data-scrapetag-only>
            <label class="scrape-url-label" for="scrape-target-url">TARGET URL</label>
            <input
              id="scrape-target-url"
              class="scrape-url-input"
              type="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="https://example.com"
            />
          </div>
          <section id="spooler-setup" class="spooler-setup" hidden>
            <div class="spooler-setup-head">
              <p class="spooler-setup-title">Spooler Runtime Check</p>
              <span id="spooler-health-pill" class="runner-chip">checking</span>
            </div>
            <p id="spooler-setup-message" class="spooler-setup-message">Checking Python dependencies...</p>
            <div class="spooler-setup-actions">
              <button id="spooler-install-deps" class="primary-action" type="button">INSTALL MISSING DEPENDENCIES</button>
            </div>
          </section>

          <section id="scrape-shell" class="scrape-shell" hidden>
            <nav class="webview-nav-bar" data-scrapetag-only>
              <button id="wv-back" class="wv-nav-btn" type="button" aria-label="Go back" title="Back">&#8592;</button>
              <button id="wv-forward" class="wv-nav-btn" type="button" aria-label="Go forward" title="Forward">&#8594;</button>
              <button id="wv-reload" class="wv-nav-btn" type="button" aria-label="Reload page" title="Reload">&#8635;</button>
              <span id="wv-current-url" class="wv-current-url"></span>
            </nav>
            <webview
              id="scrape-webview"
              class="scrape-webview"
              src="about:blank"
              partition="persist:ghostops-scrape"
              allowpopups="false"
            ></webview>
          </section>
          <section id="spooler-shell" class="scrape-shell" hidden>
            <webview
              id="spooler-webview"
              class="scrape-webview"
              src="about:blank"
              partition="persist:ghostops-spooler"
              allowpopups="false"
            ></webview>
          </section>
          <pre id="terminal-log" class="terminal-log"></pre>
        </div>
      </section>
    </template>

    <template id="placeholder-config-template">
      <article class="docs-view">
        <h3>Settings</h3>
        <p>
          Operator preferences and session controls will live here. For now, boot sequences can be skipped by setting
          <code>localStorage.ghostops_skip_boot_sequences = '1'</code> in DevTools.
        </p>
      </article>
    </template>

    <template id="placeholder-auth-template">
      <article class="docs-view">
        <h3>Sign In</h3>
        <p>Identity and tenancy are not wired yet. This screen reserves the route for a future auth bridge.</p>
      </article>
    </template>

    <template id="docs-template">
      <article class="docs-view">
        <h3>System Documentation</h3>
        <p>GHOSTops Terminal is a context aware launcher and status wall for operational modules under <code>../Toolbelt</code>.</p>
        <h4>Runtime Flow</h4>
        <ul>
          <li>Sidebar selects a module route</li>
          <li>Renderer polls tool presence through <code>window.ghostOps.checkTool</code></li>
          <li>Stage hydrates state A, B, or C based on route and filesystem response</li>
        </ul>
        <h4>Toolbelt Contract</h4>
        <pre><code>Toolbelt/
  scrapetag/
    index.js
  Trace/
    index.js
  GHOSTstub/
    index.js</code></pre>
        <h4>Security Notes</h4>
        <ul>
          <li>Renderer uses preload scoped APIs only</li>
          <li>Main process validates tool names before spawn</li>
          <li>No direct Node access in browser context</li>
        </ul>
      </article>
    </template>

    <script type="module" src="renderer.js"></script>
  </body>
</html>
